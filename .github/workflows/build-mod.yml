name: Build Mod Distribution

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create ZIP for Manual Install
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          $zipName = "TI4_Pablo_Patch_$ver.zip"
          # Packt den Inhalt des Mods-Ordners in eine ZIP
          7z a $zipName "./Mods/*"
          echo "FINAL_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          
          # Ersetzt den Platzhalter {{VERSION}} in der installer.iss durch den echten Tag
          (Get-Content installer.iss) -replace '{{VERSION}}', $ver | Set-Content installer.iss
          
          # Inno Setup Compiler (ISCC) ausführen. 
          # Er findet die Bilder/Texte im Unterordner 'installer/', da die Pfade in der .iss nun darauf zeigen.
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          
          # Die erzeugte EXE umbenennen, damit die Version im Dateinamen steht
          $exeName = "TI4_Pablo_Patch_Installer_$ver.exe"
          if (Test-Path "TI4_Pablo_Patch_Installer.exe") {
              Move-Item "TI4_Pablo_Patch_Installer.exe" $exeName
          }
          echo "FINAL_EXE=$exeName" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.FINAL_ZIP }}
            ${{ env.FINAL_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}